name: CI

permissions:
  contents: read

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  byte-identity:
    name: Byte-identity gates (CPU)
    runs-on: [self-hosted, cpu]
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - run: git submodule update --init --recursive
      - uses: dtolnay/rust-toolchain@stable
      - name: Dump core goldens
        run: scripts/dump_goldens.sh core
      - name: Oracle gates
        run: bazel test //python:all
